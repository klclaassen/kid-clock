<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="UTF-8">
  <title>Kid Clock</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
      padding: 4vh 5vw;
      transition: background 0.35s ease, color 0.35s ease;
      background: #1A237E;
      color: white;
    }

    #icon {
      font-size: 18vw;
      line-height: 1;
      margin-bottom: 2vh;
    }

    #time {
      font-size: 24vw;
      line-height: 1;
      font-weight: bold;
    }

    #msg {
      margin-top: 2vh;
      font-size: 8vw;
      font-weight: bold;
      line-height: 1.1;
    }

    #bar-wrap {
      width: 92%;
      max-width: 900px;
      margin-top: 4vh;
      display: none;
    }

    #track-row {
      display: flex;
      align-items: center;
      gap: 3vw;
    }

    #track-start,
    #track-end {
      font-size: 8vw;
      line-height: 1;
      flex: 0 0 auto;
    }

    #bar-bg {
      flex: 1 1 auto;
      height: 7vh;
      min-height: 36px;
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 3px rgba(0,0,0,0.15);
    }

    #bar-fill {
      width: 0%;
      height: 100%;
      background: #000;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    #minutes {
      margin-top: 2vh;
      font-size: 7vw;
      font-weight: bold;
      line-height: 1.1;
    }
  </style>
</head>
<body>
  <div id="icon">🌙</div>
  <div id="time">--:--</div>
  <div id="msg">Sleep time</div>

  <div id="bar-wrap">
    <div id="track-row">
      <div id="track-start">🌙</div>
      <div id="bar-bg">
        <div id="bar-fill"></div>
      </div>
      <div id="track-end">🌞</div>
    </div>
    <div id="minutes"></div>
  </div>

  <script>
    // SETTINGS
    const BED_HOUR = 18;         // 6:30 PM
    const BED_MINUTE = 30;

    const WAKE_HOUR = 10;         // example: 7:00 AM
    const WAKE_MINUTE = 0;

    const WARNING_MINUTES = 20;  // "almost time" before wake
    const WAKE_SCREEN_HOURS = 2; // show sunshine wake screen for 2 hours

    const body = document.body;
    const iconEl = document.getElementById("icon");
    const timeEl = document.getElementById("time");
    const msgEl = document.getElementById("msg");
    const barWrap = document.getElementById("bar-wrap");
    const barFill = document.getElementById("bar-fill");
    const minutesEl = document.getElementById("minutes");

    function formatTime(date) {
      let h = date.getHours();
      const m = date.getMinutes();
      let displayHour = h % 12;
      if (displayHour === 0) displayHour = 12;
      return displayHour + ":" + String(m).padStart(2, "0");
    }

    function getTimeOnDate(baseDate, hour, minute) {
      const d = new Date(baseDate);
      d.setHours(hour, minute, 0, 0);
      return d;
    }

    function updateClock() {
      const now = new Date();
      timeEl.textContent = formatTime(now);

      const todayBed = getTimeOnDate(now, BED_HOUR, BED_MINUTE);
      const todayWake = getTimeOnDate(now, WAKE_HOUR, WAKE_MINUTE);

      let currentSleepStart, currentWakeTime;

      // Figure out which sleep block we are currently around
      if (now >= todayBed) {
        // after today's bedtime, next wake is tomorrow
        currentSleepStart = todayBed;
        currentWakeTime = new Date(todayWake);
        currentWakeTime.setDate(currentWakeTime.getDate() + 1);
      } else if (now < todayWake) {
        // after midnight but before wake-up, sleep started yesterday
        currentSleepStart = new Date(todayBed);
        currentSleepStart.setDate(currentSleepStart.getDate() - 1);
        currentWakeTime = todayWake;
      } else {
        // daytime between wake-up and bedtime
        currentSleepStart = todayBed;
        currentWakeTime = todayWake;
      }

      const wakeScreenEnd = new Date(currentWakeTime);
      wakeScreenEnd.setHours(wakeScreenEnd.getHours() + WAKE_SCREEN_HOURS);

      const isSleeping = now >= currentSleepStart && now < currentWakeTime;
      const minsLeft = Math.ceil((currentWakeTime - now) / 60000);
      const almostTime = isSleeping && minsLeft > 0 && minsLeft <= WARNING_MINUTES;
      const isWakeWindow = now >= currentWakeTime && now < wakeScreenEnd;

      if (almostTime) {
        const progress = ((WARNING_MINUTES - minsLeft) / WARNING_MINUTES) * 100;

        body.style.background = "linear-gradient(180deg, #283593 0%, #f9a825 100%)";
        body.style.color = "white";
        iconEl.textContent = "";
        msgEl.textContent = "";
        barWrap.style.display = "block";
        barFill.style.width = progress + "%";
        minutesEl.textContent = minsLeft === 1
          ? "1 minute until wake-up"
          : `${minsLeft} minutes until wake-up`;

      } else if (isSleeping) {
        body.style.background = "#1A237E";
        body.style.color = "white";
        iconEl.textContent = "🌙";
        msgEl.textContent = "Sleep time";
        barWrap.style.display = "none";
        barFill.style.width = "0%";
        minutesEl.textContent = "";

      } else if (isWakeWindow) {
        body.style.background = "#FFD54F";
        body.style.color = "#222";
        iconEl.textContent = "🌞";
        msgEl.textContent = "Time to wake up!";
        barWrap.style.display = "none";
        barFill.style.width = "0%";
        minutesEl.textContent = "";

      } else {
        // Plain daytime clock only
        body.style.background = "#ffffff";
        body.style.color = "#222";
        iconEl.textContent = "";
        msgEl.textContent = "";
        barWrap.style.display = "none";
        barFill.style.width = "0%";
        minutesEl.textContent = "";
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
