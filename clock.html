<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      transition: background 0.5s ease, color 0.5s ease;
      color: white;
      background: #1A237E;
      padding: 4vh 5vw;
      box-sizing: border-box;
    }

    #icon {
      font-size: 12vw;
      line-height: 1;
      margin-bottom: 2vh;
    }

    #time {
      font-size: 22vw;
      line-height: 1;
      font-weight: bold;
    }

    #msg {
      margin-top: 2vh;
      font-size: 7vw;
      font-weight: bold;
    }

    #bar-wrap {
      width: 80%;
      max-width: 700px;
      margin-top: 4vh;
      display: none;
    }

    #bar-label {
      font-size: 4.5vw;
      margin-bottom: 1vh;
      font-weight: bold;
    }

    #bar-bg {
      width: 100%;
      height: 5vh;
      min-height: 24px;
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.15);
    }

    #bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffb300, #ffd54f, #fff176);
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    #minutes {
      margin-top: 1.5vh;
      font-size: 4.5vw;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="icon">🌙</div>
  <div id="time">--:--</div>
  <div id="msg">SLEEP TIME</div>

  <div id="bar-wrap">
    <div id="bar-label">Almost time</div>
    <div id="bar-bg">
      <div id="bar-fill"></div>
    </div>
    <div id="minutes"></div>
  </div>

  <script>
    const WAKE_HOUR = 11;
    const WAKE_MINUTE = 30;
    const WARNING_MINUTES = 30;

    function minutesUntilWake(now) {
      const wake = new Date(now);
      wake.setHours(WAKE_HOUR, WAKE_MINUTE, 0, 0);
      return Math.floor((wake - now) / 60000);
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();

      let displayHour = h % 12;
      if (displayHour === 0) displayHour = 12;
      document.getElementById("time").textContent =
        displayHour + ":" + String(m).padStart(2, "0");

      const wake = new Date(now);
      wake.setHours(WAKE_HOUR, WAKE_MINUTE, 0, 0);

      const minsLeft = Math.ceil((wake - now) / 60000);
      const awake = now >= wake;
      const almostTime = !awake && minsLeft <= WARNING_MINUTES && minsLeft > 0;

      const body = document.body;
      const icon = document.getElementById("icon");
      const msg = document.getElementById("msg");
      const barWrap = document.getElementById("bar-wrap");
      const barFill = document.getElementById("bar-fill");
      const minutes = document.getElementById("minutes");

      if (awake) {
        body.style.background = "#FFD54F";
        body.style.color = "#333";
        icon.textContent = "☀️";
        msg.textContent = "YOU CAN GET UP";
        barWrap.style.display = "none";
      } else if (almostTime) {
        const progress = ((WARNING_MINUTES - minsLeft) / WARNING_MINUTES) * 100;

        body.style.background = "linear-gradient(180deg, #5e35b1 0%, #fb8c00 55%, #ffd54f 100%)";
        body.style.color = "white";
        icon.textContent = "🌅";
        msg.textContent = "ALMOST TIME";
        barWrap.style.display = "block";
        barFill.style.width = progress + "%";
        minutes.textContent = minsLeft + " minute" + (minsLeft === 1 ? "" : "s") + " to go";
      } else {
        body.style.background = "#1A237E";
        body.style.color = "white";
        icon.textContent = "🌙";
        msg.textContent = "SLEEP TIME";
        barWrap.style.display = "none";
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
